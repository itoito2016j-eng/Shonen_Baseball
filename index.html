function clearDynamics(){runnersBox.innerHTML='';outBox.innerHTML=''}function placeRunners(c,action){clearDynamics();cases[c].runners.forEach(function(r){var p=runnerHomePos[r],d=document.createElement('div');d.className='runner';d.dataset.from=r;d.style.left=p[0]+'%';d.style.top=p[1]+'%';var e='🏃';if(action==='run'&&r==='3')e='🏃💨';if(action==='stop'&&r==='3')e='🛑';if(action==='run'&&r==='2'&&c==='2')e='🏃💨';if(action==='stop'&&r==='2'&&c==='2')e='🛑';d.textContent=e;runnersBox.appendChild(d)})}function placeBatter(){batterBox.innerHTML='';var d=document.createElement('div');d.className='batter';d.style.left='44%';d.style.top='92%';d.textContent='🧑';batterBox.appendChild(d);var b=document.createElement('div');b.className='batter';b.style.left='40%';b.style.top='88%';b.textContent='🏏';batterBox.appendChild(b)}function removeGlow(){document.querySelectorAll('.player').forEach(function(p){p.classList.remove('glow')})}function removeTarget(){document.querySelectorAll('rect').forEach(function(p){p.classList.remove('target-base')})}function resetPlayerPositions(){Object.keys(originalPos).forEach(function(k){var v=originalPos[k],el=document.getElementById('pl_'+k);el.style.left=v[0]+'%';el.style.top=v[1]+'%'})}
function arcAnimate(el,sx,sy,ex,ey,arc,dur,cb){var steps=Math.max(20,Math.round(dur/16)),midX=(sx+ex)/2,midY=Math.min(sy,ey)-arc,i=0;function step(){var t=i/steps,x=(1-t)*(1-t)*sx+2*(1-t)*t*midX+t*t*ex,y=(1-t)*(1-t)*sy+2*(1-t)*t*midY+t*t*ey;el.style.left=x+'%';el.style.top=y+'%';i++;if(i<=steps)requestAnimationFrame(step);else if(cb)cb()}step()}function animateBallToFielder(tp,cb){ballwrap.style.left='50%';ballwrap.style.top='90%';ballwrap.classList.add('pulse');void ballwrap.offsetWidth;arcAnimate(ballwrap,50,90,tp[0],tp[1],15,900,cb)}
function buildQuestionText(){var c=cases[currentCase].short,h=hits[currentHit].easy,a='';if(currentAction){var label=currentCase==='2'?'2るい':'3るい',cls=currentAction==='run'?'run':'stop',txt=currentAction==='run'?'🏃 走ってる':'🛑 止まってる';a='<span class="runner-status '+cls+'">'+label+txt+'</span>'}return'<div class="qline"><span>'+outDotsHTML(currentOut)+' '+currentOut+'アウト</span><span>🏃 '+c+'</span>'+a+'<span>⚾ '+h+'</span><span>👉 どこへ？</span></div>'}function needRunnerAction(c,h){var hasR3=(c==='3'||c==='1_3'||c==='2_3'||c==='満塁');return(hasR3&&hits[h].ground)||(c==='2'&&hits[h].ground)}function nextQ(){if(lives<=0){document.getElementById('gameover').classList.add('show');return}removeGlow();removeTarget();resetPlayerPositions();document.getElementById('result').textContent='--';document.getElementById('exp').textContent='ボールが とどいたら ベースまで うごかしてね！';document.getElementById('nextBox').style.display='none';document.getElementById('stepIndicator').style.display='none';currentCase=caseKeys[Math.floor(Math.random()*caseKeys.length)];currentHit=hitKeys[Math.floor(Math.random()*hitKeys.length)];currentOut=Math.floor(Math.random()*3);currentAction=needRunnerAction(currentCase,currentHit)?(Math.random()<.5?'run':'stop'):null;if(currentOut===2)currentAction=null;currentAnswer=answerLogic(currentCase,currentHit,currentOut,currentAction);currentStep=0;placeBatter();placeRunners(currentCase,currentAction);document.getElementById('qbox').innerHTML=buildQuestionText();canDrag=false;hintArrow.style.display='none';var tk=hits[currentHit].pos,tp=[players[tk][0],players[tk][1]];animateBallToFielder(tp,function(){document.getElementById('pl_'+tk).classList.add('glow');canDrag=true;hintArrow.style.display='block'})}function replay(){if(!currentHit){nextQ();return}removeGlow();var tk=hits[currentHit].pos,tp=[players[tk][0],players[tk][1]];canDrag=false;currentStep=0;document.getElementById('stepIndicator').style.display='none';animateBallToFielder(tp,function(){document.getElementById('pl_'+tk).classList.add('glow');canDrag=true})}function resetAll(){if(!confirm('このモードを けします。いい？'))return;score=0;combo=0;lives=3;cleared={};saveState();updateUI();document.getElementById('qbox').textContent='「▶ スタート」を おしてね！';document.getElementById('result').textContent='--';document.getElementById('exp').textContent='--';document.getElementById('nextBox').style.display='none'}function continueGame(){lives=3;document.getElementById('gameover').classList.remove('show');updateUI()}
var dragging=false;function getPct(cx,cy){var r=field.getBoundingClientRect();return[((cx-r.left)/r.width)*100,((cy-r.top)/r.height)*100]}function onDown(e){if(!canDrag)return;dragging=true;hintArrow.style.display='none';e.preventDefault()}function onMove(e){if(!dragging)return;var cx,cy;if(e.touches&&e.touches[0]){cx=e.touches[0].clientX;cy=e.touches[0].clientY}else{cx=e.clientX;cy=e.clientY}var p=getPct(cx,cy);ballwrap.style.left=p[0]+'%';ballwrap.style.top=p[1]+'%'}function onUp(e){if(!dragging)return;dragging=false;var cx,cy;if(e.changedTouches&&e.changedTouches[0]){cx=e.changedTouches[0].clientX;cy=e.changedTouches[0].clientY}else{cx=e.clientX;cy=e.clientY}var p=getPct(cx,cy),hit=null,minD=999;for(var k in bases){var v=bases[k],d=Math.hypot(p[0]-v[0],p[1]-v[1]);if(d<minD){minD=d;hit=k}}if(minD<18)judge(hit)}ballwrap.addEventListener('mousedown',onDown);document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);ballwrap.addEventListener('touchstart',onDown,{passive:false});document.addEventListener('touchmove',function(e){if(dragging)e.preventDefault();onMove(e)},{passive:false});document.addEventListener('touchend',onUp);
function showOut(x,y,text){var d=document.createElement('div');d.className='outmark';d.style.left=x+'%';d.style.top=(y-6)+'%';d.textContent=text||'❌ アウト!';outBox.appendChild(d)}function showRun(text,x,y,color){var d=document.createElement('div');d.className='outmark';d.style.left=x+'%';d.style.top=y+'%';if(color)d.style.color=color;d.textContent=text;outBox.appendChild(d)}function showNextCommentary(){var nx=nextCommentary(currentMode,currentCase,currentHit,currentOut,currentAction);document.getElementById('nextBox').style.display='block';document.getElementById('nextTitle').textContent=nx.title;document.getElementById('nextText').textContent=nx.text}function judge(baseKey){removeGlow();canDrag=false;var expected=currentAnswer.steps[currentStep],fromPos;if(currentStep===0)fromPos=[players[hits[currentHit].pos][0],players[hits[currentHit].pos][1]];else{var prev=currentAnswer.steps[currentStep-1];fromPos=[bases[prev][0],bases[prev][1]]}var basePos=bases[baseKey];if(baseKey===expected){var isLast=(currentStep===currentAnswer.steps.length-1);arcAnimate(ballwrap,fromPos[0],fromPos[1],basePos[0],basePos[1],10,700,function(){var bel=document.getElementById('b'+baseKey);bel.classList.add('base-flash');setTimeout(function(){bel.classList.remove('base-flash')},1200);showOut(basePos[0],basePos[1]);if(isLast){var add=100,msg='〇 せいかい！';if(currentAnswer.gettsuu&&currentAnswer.steps.length===2){add=200;msg='🎉 ゲッツーせいこう！ +200'}else if(currentAnswer.out2){add=150;msg='〇 2アウトフォース！ +150'}score+=add;combo++;cleared[currentCase+'|'+currentHit]=true;saveState();document.getElementById('result').innerHTML='<span class="ok">'+msg+'</span>';document.getElementById('exp').textContent='⭐ '+currentAnswer.low;document.getElementById('stepIndicator').style.display='none';showNextCommentary();updateUI()}else{currentStep++;document.getElementById('stepIndicator').style.display='inline-block';document.getElementById('stepIndicator').textContent=(currentStep+1)+'球目: '+bases[currentAnswer.steps[curren
