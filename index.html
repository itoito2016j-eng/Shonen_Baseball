<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>やきゅう まもりの ばしょ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --sora:#8ecae6;--sora-deep:#6cb6d6;--shiba:#5fb96a;--shiba-deep:#3f9b50;
    --tsuchi:#e8a86a;--tsuchi-deep:#d4894a;--taiyo:#ffd23f;--shiro:#fffdf5;
    --nuime:#e84a3c;--sumi:#3a2e26;--ki:#b5763e;--ki-deep:#8a5a2d;--ki-light:#d49a5e;
    --aoi:#2a7fb8;--orange:#f2a30a;--murasaki:#6b4ea8;--sky:#eaf6fb;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:"Zen Maru Gothic","Hiragino Maru Gothic ProN",system-ui,sans-serif;color:var(--sumi);
    background:radial-gradient(circle at 82% 11%, rgba(255,210,63,.5) 0 56px, transparent 66px),
      linear-gradient(180deg,var(--sora) 0%,var(--sora) 44%,#bfe3a8 45%,#bfe3a8 100%);
    min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:14px 12px 24px;overflow-x:hidden;}
  .cloud{position:fixed;inset:0 0 auto 0;pointer-events:none;z-index:0;}
  .cloud span{position:absolute;background:#fff;border-radius:40px;opacity:.85;}
  .c1{width:90px;height:30px;top:26px;left:7%;}.c2{width:60px;height:22px;top:62px;left:24%;}.c3{width:70px;height:24px;top:42px;right:28%;}
  .wrap{width:100%;max-width:760px;position:relative;z-index:2;}
  h1.title{font-family:"Mochiy Pop One",sans-serif;text-align:center;color:var(--shiro);
    font-size:clamp(20px,5.6vw,30px);line-height:1.3;text-shadow:0 3px 0 var(--ki-deep),0 0 8px rgba(0,0,0,.12);margin-bottom:10px;}
  .stage{background:linear-gradient(160deg,var(--ki-light),var(--ki) 55%,var(--ki-deep));border-radius:22px;padding:14px;position:relative;
    box-shadow:0 12px 0 var(--ki-deep),0 20px 30px rgba(0,0,0,.22);}
  .stage::before,.stage::after{content:"";position:absolute;width:13px;height:13px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#f0c98a,#7a4f24);top:11px;}
  .stage::before{left:11px;}.stage::after{right:11px;}
  .plaque{position:absolute;top:-15px;left:50%;transform:translateX(-50%);background:var(--nuime);color:#fff;
    font-family:"Mochiy Pop One",sans-serif;font-size:12px;padding:5px 16px;border-radius:20px;white-space:nowrap;box-shadow:0 4px 0 #b23629;z-index:5;}
  .screen{background:var(--sky);border-radius:14px;border:4px solid #fff;overflow:hidden;
    box-shadow:inset 0 2px 6px rgba(0,0,0,.08);padding:14px 14px 14px;display:flex;flex-direction:column;}

  /* HOME */
  .home-mascot{width:130px;margin:0 auto 2px;}
  .home-lead{text-align:center;font-weight:700;font-size:15px;line-height:1.6;margin-bottom:14px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .card{font-family:"Zen Maru Gothic",sans-serif;cursor:pointer;border:none;border-radius:16px;padding:16px 14px;text-align:left;
    color:#fff;display:flex;align-items:center;gap:12px;transition:transform .08s;box-shadow:0 5px 0 rgba(0,0,0,.18);}
  .card:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.18);}
  .card .ic{font-size:24px;flex:0 0 auto;}
  .card b{font-family:"Mochiy Pop One",sans-serif;font-size:16px;display:block;}
  .card small{font-size:11px;opacity:.92;}
  .k0{background:var(--shiba);box-shadow:0 5px 0 var(--shiba-deep);}
  .k1{background:#e89b3a;box-shadow:0 5px 0 #c47c1e;}
  .k2{background:var(--aoi);box-shadow:0 5px 0 #1d5d8a;}
  .k3{background:var(--murasaki);box-shadow:0 5px 0 #4a3380;}
  .k4{background:var(--nuime);box-shadow:0 5px 0 #b23629;}
  .k5{background:#2f9e8f;box-shadow:0 5px 0 #1f7064;}
  .help{grid-column:1 / -1;background:var(--ki);box-shadow:0 5px 0 var(--ki-deep);justify-content:center;}

  /* VIEWER */
  .vtop{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;}
  .sit-badge{font-family:"Mochiy Pop One",sans-serif;font-size:12px;background:var(--nuime);color:#fff;padding:5px 12px;border-radius:14px;}
  .sc-title{font-family:"Mochiy Pop One",sans-serif;font-size:clamp(16px,4.4vw,21px);color:var(--sumi);flex:1;text-align:center;}
  .mini-help{font-family:"Mochiy Pop One",sans-serif;font-size:12px;background:var(--ki);color:#fff;border:none;border-radius:12px;padding:6px 10px;cursor:pointer;}
  .field-wrap{background:#fff;border-radius:12px;padding:4px;}
  svg.field{width:100%;display:block;border-radius:9px;}
  .instr{margin-top:10px;background:linear-gradient(160deg,var(--ki-light),var(--ki));border:2px solid var(--ki-deep);border-radius:13px;
    padding:11px 14px;color:#fff;font-weight:700;font-size:clamp(14px,3.8vw,17px);line-height:1.55;min-height:52px;display:flex;align-items:center;}
  .nav{display:flex;align-items:center;justify-content:space-between;margin-top:14px;gap:10px;}
  .btn{font-family:"Mochiy Pop One",sans-serif;font-size:15px;border:none;cursor:pointer;border-radius:16px;padding:13px 18px;color:#fff;
    transition:transform .08s;box-shadow:0 5px 0 rgba(0,0,0,.18);}
  .btn:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.18);}
  .btn-prev{background:#9aa7b0;box-shadow:0 5px 0 #6f7c85;}
  .btn-next{background:var(--shiba);box-shadow:0 5px 0 var(--shiba-deep);}
  .btn-home{background:var(--aoi);box-shadow:0 5px 0 #1d5d8a;font-size:13px;padding:13px 14px;}
  .btn:disabled{opacity:.35;cursor:default;}.btn:disabled:active{transform:none;}
  .count{flex:1;text-align:center;font-family:"Mochiy Pop One",sans-serif;font-size:13px;color:#fff;text-shadow:0 1px 0 rgba(0,0,0,.15);}

  /* legend modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:50;padding:18px;}
  .overlay.show{display:flex;}
  .modal{background:var(--shiro);border-radius:18px;max-width:420px;width:100%;padding:20px;box-shadow:0 14px 40px rgba(0,0,0,.3);}
  .modal h2{font-family:"Mochiy Pop One",sans-serif;font-size:18px;margin-bottom:14px;text-align:center;color:var(--sumi);}
  .leg-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
  .leg-ic{flex:0 0 30px;height:30px;display:flex;align-items:center;justify-content:center;}
  .leg-dot{width:26px;height:26px;border-radius:50%;}
  .leg-row b{display:block;font-size:14px;}
  .leg-row small{font-size:12px;color:#7a6a58;}
  .modal .btn{display:block;width:100%;margin-top:8px;background:var(--nuime);box-shadow:0 5px 0 #b23629;text-align:center;}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
  .quiz-link{display:block;margin:16px auto 0;max-width:420px;text-align:center;text-decoration:none;
    font-family:"Mochiy Pop One",sans-serif;font-size:16px;color:var(--sumi);background:var(--taiyo);
    padding:15px 18px;border-radius:18px;box-shadow:0 5px 0 #d9a800;transition:transform .08s;}
  .quiz-link:active{transform:translateY(3px);box-shadow:0 2px 0 #d9a800;}
</style>
</head>
<body>
<div class="cloud"><span class="c1"></span><span class="c2"></span><span class="c3"></span></div>
<div class="wrap">
  <h1 class="title">⚾ やきゅう まもりの ばしょ</h1>
  <div class="stage">
    <div class="plaque" id="plaque">ばしょを えらんでね</div>
    <div class="screen" id="screen"></div>
  </div>
  <div class="nav" id="nav" style="display:none;">
    <button class="btn btn-home" onclick="home()">🏠 メニュー</button>
    <button class="btn btn-prev" id="prevBtn" onclick="prev()">◀ まえ</button>
    <div class="count" id="count"></div>
    <button class="btn btn-next" id="nextBtn" onclick="next()">つぎ ▶</button>
  </div>

  <a class="quiz-link" href="yakyu-quiz.html">⚾ やきゅうクイズに ちょうせん！ ▶</a>
</div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeHelp()">
  <div class="modal">
    <h2>この えほんの みかた</h2>
    <div class="leg-row"><span class="leg-ic"><span class="leg-dot" style="background:#e84a3c"></span></span><div><b>あかい てんせん</b><small>うった ボール</small></div></div>
    <div class="leg-row"><span class="leg-ic"><span class="leg-dot" style="background:#ed7d0e;border:2px solid #fff;box-shadow:0 0 0 1px #ddd"></span></span><div><b>オレンジの やじるし</b><small>なげる ボール</small></div></div>
    <div class="leg-row"><span class="leg-ic"><span class="leg-dot" style="background:#f2a30a;display:flex;align-items:center;justify-content:center;font-size:13px">⚾</span></span><div><b>きいろい まる</b><small>ボールを とる 人</small></div></div>
    <div class="leg-row"><span class="leg-ic"><span class="leg-dot" style="background:#2a7fb8"></span></span><div><b>あおい まる</b><small>まもりの 人</small></div></div>
    <div class="leg-row"><span class="leg-ic"><span class="leg-dot" style="background:#6b4ea8"></span></span><div><b>むらさきの 人</b><small>ランナー</small></div></div>
    <button class="btn" onclick="closeHelp()">とじる</button>
  </div>
</div>

<script>
/* ===== positions (SVG coords) ===== */
const POS={
  H:[380,490],B1:[548,320],B2:[380,150],B3:[212,320],
  P:[380,345],C:[380,535],"1B":[500,332],"2B":[460,262],
  "3B":[260,332],SS:[300,262],LF:[238,158],CF:[380,118],RF:[522,158]
};
const NAME={P:"ピッチャー",C:"キャッチャー","1B":"ファースト","2B":"セカンド","3B":"サード",
  SS:"ショート",LF:"レフト",CF:"センター",RF:"ライト"};
const FIELDERS=["P","C","1B","2B","3B","SS","LF","CF","RF"];

function mascotSVG(){return `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <ellipse cx="100" cy="178" rx="55" ry="10" fill="rgba(0,0,0,.12)"/>
  <circle cx="100" cy="100" r="62" fill="#fffdf5" stroke="#e0d8c4" stroke-width="3"/>
  <path d="M55,72 q12,28 0,56 M145,72 q-12,28 0,56" stroke="#e84a3c" stroke-width="4" fill="none"/>
  <path d="M58,80 l-7,-4 M58,92 l-8,-2 M58,104 l-8,1 M142,80 l7,-4 M142,92 l8,-2 M142,104 l8,1" stroke="#e84a3c" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M52,64 a48,40 0 0 1 96,0 l14,-4 -8,16 z" fill="#2a7fb8"/>
  <ellipse cx="100" cy="60" rx="40" ry="14" fill="#2a7fb8"/><circle cx="100" cy="66" r="5" fill="#fff"/>
  <circle cx="84" cy="98" r="8" fill="#3a2e26"/><circle cx="116" cy="98" r="8" fill="#3a2e26"/>
  <circle cx="87" cy="95" r="2.5" fill="#fff"/><circle cx="119" cy="95" r="2.5" fill="#fff"/>
  <path d="M86,118 q14,16 28,0" stroke="#3a2e26" stroke-width="4" fill="none" stroke-linecap="round"/>
  <circle cx="70" cy="112" r="7" fill="#ffb0b0" opacity=".55"/><circle cx="130" cy="112" r="7" fill="#ffb0b0" opacity=".55"/>
  <circle cx="158" cy="120" r="20" fill="#a9742f" stroke="#6e4a1c" stroke-width="3"/>
  <path d="M150,112 l16,16 M166,112 l-16,16" stroke="#6e4a1c" stroke-width="2"/></svg>`;}

function rotSquare(x,y,s,fill,stroke){return `<rect x="${x-s/2}" y="${y-s/2}" width="${s}" height="${s}" rx="2" transform="rotate(45 ${x} ${y})" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>`;}
function line(a,b,color,dash,marker){const[x1,y1]=a,[x2,y2]=b;
  return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${color}" stroke-width="6" stroke-linecap="round" ${dash?'stroke-dasharray="11 8"':''} marker-end="url(#${marker})"/>`;}
function plainLine(a,b,color,w){const[x1,y1]=a,[x2,y2]=b;return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${color}" stroke-width="${w}"/>`;}

function runnerIcon(x,y){return `<g>
  <circle cx="${x}" cy="${y}" r="17" fill="#6b4ea8" stroke="#fff" stroke-width="2.5"/>
  <circle cx="${x}" cy="${y-5}" r="5" fill="#fff"/>
  <path d="M${x-8},${y+10} q8,-11 16,0 z" fill="#fff"/></g>`;}

function fielderIcon(k,active){const[x,y]=POS[k];const r=active?24:18;
  let g=`<circle cx="${x}" cy="${y}" r="${r}" fill="${active?'#f2a30a':'#2a7fb8'}" stroke="#fff" stroke-width="${active?3.5:2.5}"/>`;
  if(active) g+=`<text x="${x}" y="${y+6}" text-anchor="middle" font-size="20">⚾</text>`;
  g+=`<text x="${x}" y="${y+r+15}" text-anchor="middle" font-family="'Zen Maru Gothic',sans-serif" font-size="${active?15:12.5}" font-weight="${active?'900':'700'}" fill="${active?'#e84a3c':'#3a2e26'}">${NAME[k]}</text>`;
  return g;}

function renderField(deck,sc){
  let s=`<svg class="field" viewBox="0 0 760 580" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrO" markerWidth="7" markerHeight="7" refX="4.5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 z" fill="#ed7d0e"/></marker>
      <marker id="arrW" markerWidth="7" markerHeight="7" refX="4.3" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 z" fill="#fff"/></marker>
      <marker id="arrR" markerWidth="7" markerHeight="7" refX="4.5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 z" fill="#e84a3c"/></marker>
    </defs>
    <ellipse cx="380" cy="315" rx="360" ry="270" fill="#5fb96a" stroke="#3f9b50" stroke-width="3"/>
    <polygon points="${POS.H} ${POS.B1} ${POS.B2} ${POS.B3}" fill="#e8a86a" stroke="#d4894a" stroke-width="2"/>`;
  // foul lines
  s+=plainLine(POS.H,[700,150],"#fff",3)+plainLine(POS.H,[60,150],"#fff",3);
  // baselines
  [["H","B1"],["B1","B2"],["B2","B3"],["B3","H"]].forEach(([a,b])=>s+=plainLine(POS[a],POS[b],"#fff",3));
  // mound + bases + home
  s+=`<circle cx="380" cy="345" r="24" fill="#d4894a"/>`;
  ["B1","B2","B3"].forEach(k=>{const[x,y]=POS[k];s+=rotSquare(x,y,20,"#fff","#cbb08a");});
  s+=rotSquare(POS.H[0],POS.H[1],20,"#fff","#cbb08a");
  // runners
  (deck.runners||[]).forEach(k=>{const[x,y]=POS[k];s+=runnerIcon(x,y);});
  // batted ball arrow
  s+=line(POS.H,POS[sc.f],"#e84a3c",true,"arrR");
  // throw path (white casing under, deep-orange on top)
  let prev=POS[sc.f];
  (sc.q||[]).forEach(k=>{
    const a=prev,b=POS[k];
    s+=`<line x1="${a[0]}" y1="${a[1]}" x2="${b[0]}" y2="${b[1]}" stroke="#fff" stroke-width="11" stroke-linecap="round" marker-end="url(#arrW)"/>`;
    s+=`<line x1="${a[0]}" y1="${a[1]}" x2="${b[0]}" y2="${b[1]}" stroke="#ed7d0e" stroke-width="6.5" stroke-linecap="round" marker-end="url(#arrO)"/>`;
    prev=b;
  });
  // fielders (active last so on top)
  FIELDERS.filter(k=>k!==sc.f).forEach(k=>s+=fielderIcon(k,false));
  s+=fielderIcon(sc.f,true);
  s+=`</svg>`;
  return s;
}

/* ===== DATA ===== */
const D=[
 {key:"k0",ic:"⚾",name:"ランナーなし",situation:"ランナー なし",runners:[],sc:[
  {t:"ピッチャーに ゴロ",f:"P",q:["B1"],i:"ピッチャーが とって ファーストへ なげて アウト！"},
  {t:"ピッチャーに ゴロ（1るいがわ）",f:"P",q:["B1"],i:"1るいがわの ゴロも ピッチャーが とって ファーストへ！"},
  {t:"ピッチャーに ゴロ（3るいがわ）",f:"P",q:["B1"],i:"3るいがわの ゴロも ピッチャーが とって ファーストへ！"},
  {t:"ファーストに ゴロ",f:"1B",q:["B1"],i:"ファーストが とって、じぶんで ベースを ふんで アウト！"},
  {t:"セカンドに ゴロ",f:"2B",q:["B1"],i:"セカンドが とって ファーストへ なげて アウト！"},
  {t:"サードに ゴロ",f:"3B",q:["B1"],i:"サードが とって ファーストへ なげて アウト！"},
  {t:"ショートに ゴロ",f:"SS",q:["B1"],i:"ショートが とって ファーストへ なげて アウト！"},
  {t:"レフトに ヒット",f:"LF",q:["B2"],i:"レフトが とって セカンドへ なげる（バッターを 止めよう）。"},
  {t:"レフト線の ツーベース → 2るいへ",f:"LF",q:["SS","B2"],i:"レフトが とって ショートに わたし、セカンドへ（リレー）。"},
  {t:"レフト線の ツーベース → 3るいへ",f:"LF",q:["SS","B3"],i:"レフトが とって ショートに わたし、サードへ（リレー）。"},
  {t:"左中間の ツーベース",f:"LF",q:["SS","B2"],i:"レフトが とって ショートに わたして セカンドへ（リレー）。"},
  {t:"センターに ヒット",f:"CF",q:["B2"],i:"センターが とって セカンドへ なげる。"},
  {t:"右中間の ツーベース",f:"RF",q:["2B","B2"],i:"ライトが とって セカンドに わたして セカンドへ（リレー）。"},
  {t:"ライトに ヒット",f:"RF",q:["B2"],i:"ライトが とって セカンドへ なげる。"},
  {t:"ライトに ゴロ",f:"RF",q:["B1"],i:"ライトの ゴロは すばやく ファーストへ なげる。"},
  {t:"ライト線の ツーベース",f:"RF",q:["2B","B2"],i:"ライトが とって セカンドに わたして セカンドへ（リレー）。"},
  {t:"ライト線の スリーベース",f:"RF",q:["2B","B3"],i:"ライトが とって セカンドに わたし、サードへ（リレー）。"},
 ]},
 {key:"k1",ic:"⚾",name:"ランナー1るい",situation:"ランナー 1るい",runners:["B1"],sc:[
  {t:"ピッチャーに ゴロ",f:"P",q:["B2"],i:"ピッチャーが とって セカンドへ！1るいランナーを フォースアウト。"},
  {t:"ファーストに ゴロ",f:"1B",q:["B2","B1"],i:"ファーストが セカンドへ、そして ファーストへ（ゲッツーねらい）。"},
  {t:"セカンドに ゴロ",f:"2B",q:["B2","B1"],i:"セカンドが ベースを ふんで ファーストへ（ゲッツーねらい）。"},
  {t:"サードに ゴロ",f:"3B",q:["B2","B1"],i:"サードが セカンドへ、そして ファーストへ（ゲッツーねらい）。"},
  {t:"ショートに ゴロ",f:"SS",q:["B2","B1"],i:"ショートが セカンドへ、そして ファーストへ（ゲッツーねらい）。"},
  {t:"レフトに ヒット",f:"LF",q:["SS","B3"],i:"レフトが とって、ショート経由で サードへ（ランナーを 止める）。"},
  {t:"レフト線の ツーベース",f:"LF",q:["SS","B3"],i:"レフトが とって ショートに わたし、サードへ（リレー）。"},
  {t:"左中間の ツーベース",f:"LF",q:["SS","H"],i:"レフトが とって ショート経由で ホームへ（リレー）。"},
  {t:"左中間の スリーベース",f:"CF",q:["SS","H"],i:"センターが とって ショート経由で ホームへ（リレー）。"},
  {t:"センターに ヒット",f:"CF",q:["2B","B3"],i:"センターが とって セカンド経由で サードへ。"},
  {t:"右中間の ツーベース",f:"RF",q:["2B","H"],i:"ライトが とって セカンド経由で ホームへ（リレー）。"},
  {t:"右中間の スリーベース",f:"RF",q:["2B","H"],i:"ライトが とって セカンド経由で ホームへ（リレー）。"},
  {t:"ライトに ヒット",f:"RF",q:["2B","B3"],i:"ライトが とって セカンド経由で サードへ。"},

/* ===== engine ===== */
const screen=document.getElementById('screen');
const plaque=document.getElementById('plaque');
const nav=document.getElementById('nav');
const prevBtn=document.getElementById('prevBtn');
const nextBtn=document.getElementById('nextBtn');
const count=document.getElementById('count');
let dk=null,pos=0;

function home(){
  dk=null; nav.style.display="none"; plaque.textContent="ばしょを えらんでね";
  const cards=D.map((d,i)=>`<button class="card ${d.key}" onclick="openDeck(${i})">
    <span class="ic">${d.ic}</span><span><b>${d.name}</b><small>${d.sc.length}の ばめん</small></span></button>`).join("");
  screen.innerHTML=`<div class="home-mascot">${mascotSVG()}</div>
    <div class="home-lead">ランナーの ばしょを えらんで、<br>まもりの うごきを みてみよう ⚾</div>
    <div class="grid">${cards}
      <button class="card help" onclick="openHelp()"><span class="ic">❓</span><span><b>みかた</b></span></button>
    </div>`;
}
function openDeck(i){ dk=D[i]; pos=0; nav.style.display="flex"; render(); }

function render(){
  const sc=dk.sc[pos];
  plaque.textContent=dk.situation;
  screen.innerHTML=`
    <div class="vtop">
      <span class="sit-badge">${dk.situation}</span>
      <span class="sc-title">${sc.t}</span>
      <button class="mini-help" onclick="openHelp()">みかた</button>
    </div>
    <div class="field-wrap">${renderField(dk,sc)}</div>
    <div class="instr">⚾ ${sc.i}</div>`;
  prevBtn.disabled=pos===0;
  nextBtn.disabled=pos===dk.sc.length-1;
  count.textContent=`${pos+1} / ${dk.sc.length}`;
}
function next(){ if(pos<dk.sc.length-1){pos++;render();} }
function prev(){ if(pos>0){pos--;render();} }

function openHelp(){document.getElementById('overlay').classList.add('show');}
function closeHelp(){document.getElementById('overlay').classList.remove('show');}

document.addEventListener('keydown',e=>{
  if(!dk)return;
  if(e.key==='ArrowRight')next();
  if(e.key==='ArrowLeft')prev();
});
let sx=0;
screen.addEventListener('touchstart',e=>sx=e.touches[0].clientX,{passive:true});
screen.addEventListener('touchend',e=>{if(!dk)return;const dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>50){dx<0?next():prev();}});

home();
</script>
