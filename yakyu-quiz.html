<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>やきゅうクイズ 110もん</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --sora:#8ecae6;--sora-deep:#6cb6d6;--shiba:#5fb96a;--shiba-deep:#3f9b50;
    --tsuchi:#e8a86a;--taiyo:#ffd23f;--shiro:#fffdf5;--nuime:#e84a3c;
    --sumi:#3a2e26;--ki:#b5763e;--ki-deep:#8a5a2d;--ki-light:#d49a5e;--aoi:#2a7fb8;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:"Zen Maru Gothic","Hiragino Maru Gothic ProN",system-ui,sans-serif;color:var(--sumi);
    background:
      radial-gradient(circle at 82% 11%, rgba(255,210,63,.55) 0 58px, transparent 68px),
      linear-gradient(180deg,var(--sora) 0%,var(--sora) 44%,#bfe3a8 45%,#bfe3a8 100%);
    min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:14px 12px 24px;overflow-x:hidden;
  }
  .cloud{position:fixed;inset:0 0 auto 0;pointer-events:none;z-index:0;}
  .cloud span{position:absolute;background:#fff;border-radius:40px;opacity:.85;}
  .c1{width:90px;height:30px;top:26px;left:7%;}.c2{width:60px;height:22px;top:62px;left:24%;}.c3{width:70px;height:24px;top:42px;right:28%;}
  .wrap{width:100%;max-width:540px;position:relative;z-index:2;}
  h1.title{font-family:"Mochiy Pop One",sans-serif;text-align:center;color:var(--shiro);
    font-size:clamp(22px,6.4vw,32px);line-height:1.3;text-shadow:0 3px 0 var(--ki-deep),0 0 8px rgba(0,0,0,.12);margin-bottom:10px;}
  .stage{background:linear-gradient(160deg,var(--ki-light),var(--ki) 55%,var(--ki-deep));border-radius:22px;padding:14px;position:relative;
    box-shadow:0 12px 0 var(--ki-deep),0 20px 30px rgba(0,0,0,.22);}
  .stage::before,.stage::after{content:"";position:absolute;width:13px;height:13px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#f0c98a,#7a4f24);top:11px;}
  .stage::before{left:11px;}.stage::after{right:11px;}
  .plaque{position:absolute;top:-15px;left:50%;transform:translateX(-50%);background:var(--nuime);color:#fff;
    font-family:"Mochiy Pop One",sans-serif;font-size:12px;padding:5px 16px;border-radius:20px;white-space:nowrap;box-shadow:0 4px 0 #b23629;z-index:5;}
  .screen{background:var(--shiro);border-radius:14px;border:4px solid #fff;overflow:hidden;
    box-shadow:inset 0 2px 6px rgba(0,0,0,.08);padding:18px 16px 18px;min-height:330px;display:flex;flex-direction:column;}
  .home-mascot{width:150px;margin:2px auto 4px;}
  .home-lead{text-align:center;font-weight:700;font-size:16px;line-height:1.6;margin-bottom:14px;}
  .levels{display:flex;flex-direction:column;gap:11px;}
  .lvl{font-family:"Zen Maru Gothic",sans-serif;cursor:pointer;border:none;border-radius:16px;padding:14px 16px;text-align:left;
    color:#fff;display:flex;align-items:center;gap:13px;transition:transform .08s;box-shadow:0 5px 0 rgba(0,0,0,.18);}
  .lvl:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.18);}
  .lvl .ic{font-size:26px;flex:0 0 auto;}
  .lvl .tx{display:flex;flex-direction:column;}
  .lvl .tx b{font-family:"Mochiy Pop One",sans-serif;font-size:17px;}
  .lvl .tx small{font-size:12px;opacity:.92;}
  .lvl.l1{background:var(--shiba);box-shadow:0 5px 0 var(--shiba-deep);}
  .lvl.l2{background:#e89b3a;box-shadow:0 5px 0 #c47c1e;}
  .lvl.l3{background:var(--nuime);box-shadow:0 5px 0 #b23629;}
  .lvl.l4{background:#6b4ea8;box-shadow:0 5px 0 #4a3380;}
  .lvl .best{margin-left:auto;font-family:"Mochiy Pop One",sans-serif;font-size:11px;background:rgba(255,255,255,.25);padding:4px 8px;border-radius:10px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;}
  .qnum{font-family:"Mochiy Pop One",sans-serif;font-size:13px;color:var(--aoi);}
  .score-pill{font-family:"Mochiy Pop One",sans-serif;font-size:13px;background:var(--taiyo);padding:4px 11px;border-radius:12px;}
  .pbar{height:9px;background:#e7ddca;border-radius:6px;overflow:hidden;margin-bottom:16px;}
  .pbar i{display:block;height:100%;background:linear-gradient(90deg,var(--shiba),var(--shiba-deep));border-radius:6px;transition:width .3s;}
  .qtext{font-size:clamp(16px,4.6vw,20px);font-weight:900;line-height:1.6;margin-bottom:14px;}
  .qtext .qm{color:var(--nuime);}
  .choices{display:flex;flex-direction:column;gap:9px;}
  .choice{font-family:"Zen Maru Gothic",sans-serif;font-weight:700;font-size:clamp(14px,4vw,17px);background:#fff;border:3px solid var(--sora-deep);
    color:var(--sumi);border-radius:14px;padding:12px 14px;text-align:left;cursor:pointer;display:flex;align-items:center;gap:10px;
    transition:transform .08s,background .15s,border-color .15s;}
  .choice .mk{flex:0 0 26px;height:26px;border-radius:50%;background:var(--sora-deep);color:#fff;display:flex;align-items:center;justify-content:center;
    font-family:"Mochiy Pop One",sans-serif;font-size:13px;}
  .choice:active{transform:scale(.97);}
  .choice.correct{background:#d6f5d6;border-color:var(--shiba-deep);}
  .choice.correct .mk{background:var(--shiba-deep);}
  .choice.wrong{background:#ffe0dc;border-color:var(--nuime);}
  .choice.wrong .mk{background:var(--nuime);}
  .choice.locked{cursor:default;}
  .choice.locked:not(.correct):not(.wrong){opacity:.55;}
  .feedback{margin-top:14px;border-radius:14px;padding:12px 14px;font-weight:700;font-size:clamp(14px,3.9vw,16px);line-height:1.65;display:none;}
  .feedback.show{display:block;animation:pop .3s ease;}
  .feedback.good{background:#e3f8e3;border:3px solid var(--shiba-deep);}
  .feedback.bad{background:#fff0ee;border:3px solid var(--nuime);}
  .feedback .head{font-family:"Mochiy Pop One",sans-serif;font-size:15px;display:block;margin-bottom:4px;}
  .feedback.good .head{color:var(--shiba-deep);}
  .feedback.bad .head{color:var(--nuime);}
  .term{margin-top:10px;background:rgba(255,255,255,.7);border:2px dashed var(--ki-light);border-radius:11px;
    padding:9px 11px;font-size:clamp(13px,3.6vw,15px);font-weight:500;line-height:1.55;}
  .term .tl{display:inline-block;font-family:"Mochiy Pop One",sans-serif;font-size:11px;background:var(--ki);color:#fff;
    padding:2px 9px;border-radius:9px;margin-right:6px;vertical-align:middle;}
  .term b{color:var(--ki-deep);}
  @keyframes pop{0%{transform:scale(.92);opacity:0;}100%{transform:scale(1);opacity:1;}}
  .qfoot{margin-top:auto;padding-top:14px;display:flex;gap:10px;}
  .btn{font-family:"Mochiy Pop One",sans-serif;font-size:15px;border:none;cursor:pointer;border-radius:16px;padding:13px 18px;color:#fff;
    transition:transform .08s;box-shadow:0 5px 0 rgba(0,0,0,.18);flex:1;}
  .btn:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.18);}
  .btn-next{background:var(--shiba);box-shadow:0 5px 0 var(--shiba-deep);}
  .btn-quit{background:#9aa7b0;box-shadow:0 5px 0 #6f7c85;flex:0 0 auto;padding:13px 16px;}
  .btn:disabled{opacity:.4;cursor:default;}
  .btn:disabled:active{transform:none;}
  .res{text-align:center;display:flex;flex-direction:column;align-items:center;}
  .res-mascot{width:140px;margin:4px auto 6px;}
  .res-head{font-family:"Mochiy Pop One",sans-serif;font-size:20px;color:var(--nuime);margin-bottom:4px;}
  .res-score{font-family:"Mochiy Pop One",sans-serif;font-size:40px;line-height:1.1;margin:6px 0;}
  .res-score small{font-size:18px;color:#8a7a68;}
  .res-msg{font-weight:700;font-size:15px;line-height:1.6;margin:6px 0 16px;}
  .stars{font-size:30px;letter-spacing:4px;margin:2px 0 8px;}
  .res-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:300px;}
  .btn-retry{background:var(--nuime);box-shadow:0 5px 0 #b23629;}
  .btn-home{background:var(--aoi);box-shadow:0 5px 0 #1d5d8a;}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>
<div class="cloud"><span class="c1"></span><span class="c2"></span><span class="c3"></span></div>
<div class="wrap">
  <h1 class="title">⚾ やきゅうクイズ 110もん</h1>
  <div class="stage">
    <div class="plaque" id="plaque">レベルを えらんでね</div>
    <div class="screen" id="screen"></div>
  </div>
</div>

  {q:"ワンバウンドした 投球を 打者が 空振り! 判定は?",c:["ストライク","ボール"],a:0,e:"バウンドしても 空振りは ストライク。見逃せば ボール。",t:"ワンバウンドの 投球",td:"地面に ついた 投球でも 空振りすれば ストライクに なる。"},
  {q:"ワンバウンドの 投球を 打者が 見逃した! 判定は?",c:["ストライク","ボール"],a:1,e:"バウンドした 投球を 振らなければ ボール。",t:"ワンバウンドの 投球",td:"地面に ついた 投球を 見逃せば ボール。"},
  {q:"本塁での 衝突を ふせぐ ルールで、捕手は?",c:["ボールを 持たずに 走路を ふさいでは いけない","いつでも ブロックして よい"],a:0,e:"コリジョンルール。捕球前に 走路を ふさぐと 走者は セーフに なる。",t:"コリジョンルール",td:"本塁での 危険な 衝突を ふせぐ ため、捕手の 走路ブロックを 制限する ルール。"},
  {q:"併殺を ふせぐ ため 走者が 野手めがけて 危険な スライディング! どうなる?",c:["走者と 打者走者の 2人 アウト","走者だけ アウト"],a:0,e:"違反スライディングで 妨害と され、ダブルプレーが 成立する。",t:"危険な スライディング",td:"併殺を ふせぐ ための 違法な スライディングは 守備妨害。2人 アウトに なる。"},
  {q:"フェアの 打球が、内野手を 通過する 前に 走者に 当たった! どうなる?",c:["原則 走者が アウト","インプレー続行"],a:0,e:"野手が さわる前に 打球が 走者に 当たると、ふつう 走者の アウト。",t:"打球の 当たり",td:"内野手を 通過する 前に 打球が 走者に 当たると 原則 走者アウト。"},
  {q:"フェアの 打球が、内野手を 通過した あと 走者に 当たった! どうなる?",c:["アウトに ならない（続行）","走者アウト"],a:0,e:"野手を 通過した あとなら 当たっても アウトには ならない。",t:"打球の 当たり",td:"内野手を 通過した あとの 打球が 当たっても 走者は アウトに ならない。"},
  {q:"観客が グラウンドの 打球に さわった! どうなる?",c:["ボールデッドにして 審判が 処置を きめる","ホームラン"],a:0,e:"観客妨害は ボールデッド。審判が 進塁数などを 判断する。",t:"観客妨害(ファンインターフェア)",td:"観客が プレーに さわると ボールデッドに し、審判が 妥当な 処置を きめる。"},
  {q:"投手が セットで 完全に 静止せず 投げた（走者あり）! どうなる?",c:["ボーク","セーフ"],a:0,e:"静止を しない 投球動作は ボーク。走者が 1個 すすむ。",t:"セットの 静止",td:"走者が いる時は いったん 完全に 静止してから 投げる。しないと ボーク。"},
  {q:"ボークの あと、打者が 打って ヒットに! 全走者も 進塁。どうなる?",c:["プレーを 生かす（ボーク無視）","ボークで やり直し"],a:0,e:"打者が 出塁し 全走者が 1個以上 進めば、ボークは 無視して プレーを 生かす。",t:"ボーク後の 処置",td:"打者出塁＆全走者進塁なら プレー有効、そうでなければ ボークを 適用する。"},
  {q:"打者が バッターボックスから 完全に 出て 打った! どうなる?",c:["反則打球で 打者アウト","ふつうの 打球"],a:0,e:"ボックスの そとで 打つと 反則打球。打者は アウト。",t:"反則打球",td:"バッターボックスの 外で 打つと 打者アウトに なる。"},
  {q:"インフィールドフライで 野手が わざと 落とした! 打者は?",c:["アウトの まま","セーフ"],a:0,e:"インフィールドフライは 落としても 打者アウト。走者は 自己責任で 進塁可。",t:"IFFと 故意落球",td:"インフィールドフライでは 落球しても 打者アウトの まま。フォースは 生じない。"},
  {q:"振り逃げの 打者走者が、1るいを あきらめて 円（サークル）の そとへ! どうなる?",c:["アウトが 確定する","やり直し"],a:0,e:"進塁の 意思を 放棄して ベンチへ 向かうと アウトに なる。",t:"アバンダン(放棄)",td:"打者走者が 1るいを めざす 意思を すてると アウトが 確定する。"},
  {q:"サヨナラ本塁打! でも 走者が 本塁を 踏み忘れた。得点は?",c:["アピールで その 得点が 無効に なりうる","かならず 入る"],a:0,e:"全員 正しく 触塁が ひつよう。踏み忘れは アピールで 無効に される ことが ある。",t:"触塁の 義務",td:"本塁打でも 走者は 全ての 塁を 正しく 踏む 必要が ある。"},
  {q:"タイムが かかって いないのに 守備が 気を ぬいた すきに 走者が 進塁! どうなる?",c:["インプレーなので 進塁は 有効","無効に なる"],a:0,e:"ボールインプレー中の 進塁は 認められる。気を ぬいた 守備の 責任。",t:"インプレー",td:"プレーが 止まって いない 間は、走者は すすむ ことが できる。"},
  {q:"走塁妨害（オブストラクション）が おきたが プレーは 続いて いる。あつかいは?",c:["ボールインプレー（後で 処置）","すぐ ボールデッド"],a:0,e:"プレー続行型の オブストラクションは いったん 流し、あとで 妥当な 処置を する。",t:"ディレイドデッドボール",td:"すぐ 止めず プレーを 流し、終わってから 進塁などの 処置を する 反則。"},

  {q:"打球が 1るいベースや 3るいベースに 当たった! フェア? ファウル?",c:["フェア","ファウル"],a:0,e:"塁は フェア地域に あるので、当たれば フェア。",t:"ベースの 位置",td:"1・3るいベースは フェア地域。当たった 打球は フェアに なる。"},
  {q:"救援投手は 何人と 対戦すれば 交代できる?",c:["最低 1人の 打者と 対戦する 義務が ある","いつでも 自由"],a:0,e:"出てきた 投手は、その 打者が 出塁か アウトに なるまで 投げる ぎむが ある（ケガ等を のぞく）。",t:"対戦義務",td:"救援投手は 少なくとも 1人の 打者を 完了させる まで 投げる ひつようが ある。"},
 ]}
};

const screen=document.getElementById('screen');
const plaque=document.getElementById('plaque');
const best={};
let cur=null,order=[],pos=0,score=0;

function home(){
  plaque.textContent="レベルを えらんでね";
  const total=Object.values(DATA).reduce((s,d)=>s+d.q.length,0);
  const row=(key)=>{const d=DATA[key];const b=best[key];
    return `<button class="lvl ${d.color}" onclick="start('${key}')">
      <span class="ic">${d.icon}</span><span class="tx"><b>${d.name}</b><small>${d.q.length}もん</small></span>
      ${b!=null?`<span class="best">さいこう ${b}/${d.q.length}</span>`:""}</button>`;};
  screen.innerHTML=`<div class="home-mascot">${mascot("happy")}</div>
    <div class="home-lead">レベルを えらんで チャレンジ！<br>ぜんぶで ${total}もん あるよ ⚾</div>
    <div class="levels">${row('shokyu')}${row('chukyu')}${row('jokyu')}${row('chojokyu')}</div>`;
}

function start(key){cur=key;order=[...Array(DATA[key].q.length).keys()];pos=0;score=0;question();}

function question(){
  const d=DATA[cur];const q=d.q[order[pos]];
  plaque.textContent=`${d.name}`;
  const letters=["A","B","C","D"];
  const ch=q.c.map((c,i)=>`<button class="choice" onclick="answer(this,${i},${q.a})"><span class="mk">${letters[i]}</span><span>${c}</span></button>`).join("");
  const pct=Math.round((pos)/d.q.length*100);
  screen.innerHTML=`
    <div class="topbar"><span class="qnum">だい ${pos+1} もん / ${d.q.length}</span><span class="score-pill">⚾ ${score}てん</span></div>
    <div class="pbar"><i style="width:${pct}%"></i></div>
    <div class="qtext"><span class="qm">Q.</span> ${q.q}</div>
    <div class="choices" id="choices">${ch}</div>
    <div class="feedback" id="fb"><span class="head"></span><span>${q.e}</span>
      <div class="term"><span class="tl">ことば</span><b>${q.t}</b>：${q.td}</div></div>
    <div class="qfoot">
      <button class="btn btn-quit" onclick="home()">やめる</button>
      <button class="btn btn-next" id="nextBtn" onclick="nextQ()" disabled>つぎへ ▶</button></div>`;
}

function answer(btn,picked,correct){
  const box=document.getElementById('choices');
  if(box.dataset.done) return;
  box.dataset.done="1";
  [...box.children].forEach((b,i)=>{b.classList.add('locked');
    if(i===correct) b.classList.add('correct');
    if(i===picked&&picked!==correct) b.classList.add('wrong');});
  const fb=document.getElementById('fb');const head=fb.querySelector('.head');
  if(picked===correct){score++;fb.className='feedback good show';head.textContent='⚾ せいかい！';}
  else{fb.className='feedback bad show';head.textContent='ざんねん… こたえは こっち';}
  const nb=document.getElementById('nextBtn');nb.disabled=false;
  nb.textContent=(pos===DATA[cur].q.length-1)?"けっか を みる 🏁":"つぎへ ▶";
}

function nextQ(){pos++;if(pos>=DATA[cur].q.length) result();else question();}

function result(){
  const d=DATA[cur];const total=d.q.length;
  if(best[cur]==null||score>best[cur]) best[cur]=score;
  const ratio=score/total;let stars,face,msg;
  if(ratio===1){stars="⭐⭐⭐";face="cheer";msg="パーフェクト！ きみは やきゅうマスターだ！";}
  else if(ratio>=0.7){stars="⭐⭐☆";face="cheer";msg="すごい！ ルールは ばっちりだね！";}
  else if(ratio>=0.4){stars="⭐☆☆";face="happy";msg="いいちょうし！ もういちど やって レベルアップ！";}
  else{stars="☆☆☆";face="soft";msg="だいじょうぶ、なんども やれば おぼえられるよ！";}
  plaque.textContent="けっか はっぴょう";
  screen.innerHTML=`<div class="res"><div class="res-mascot">${mascot(face)}</div>
    <div class="res-head">${d.name} クリア！</div><div class="stars">${stars}</div>
    <div class="res-score">${score}<small> / ${total}</small></div><div class="res-msg">${msg}</div>
    <div class="res-btns"><button class="btn btn-retry" onclick="start('${cur}')">もういちど 🔁</button>
      <button class="btn btn-home" onclick="home()">レベルを えらぶ 🏠</button></div></div>`;
}

home();
</script>
</body>
</html>
